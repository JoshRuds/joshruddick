<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: white;
            color: black;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
        }

        h1, h2 {
            color: red;
            font-weight: 400;
        }

        .oval-btn {
            background-color: #345eeb; 
            color: white;
            border-radius: 50px;
            padding: 10px 25px;
            border: none;
        }

        .back-link {
            color: red;
            text-decoration: underline;
            font-weight: 400;
        }

        .back-link:hover {
            color: darkred;
        }

        .section {
            padding: 50px 0;
        }

        .project-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container section">

        <!-- Back Link -->
        <a href="/" class="back-link">&larr; Back</a>

        <!-- Title -->
        <h1 class="mt-3">Projects</h1>
        <p class="mt-3">
            A collection of my work. Click on any project to learn more.
        </p>

        <hr class="my-5">

        <div class="section">

            <div class="project-card">
                <h2>Leyo</h2>
                <p>A obserbable, permissive first coding language built in C</p>
                <a href="leyo" class="oval-btn">View Project</a>
            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
